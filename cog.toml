tag_prefix = "v"
branch_whitelist = ["main"]
ignore_merge_commits = true
# Use a non-native marker (not one of GitHub's [skip ci]/[ci skip]/... strings)
# so we can do our own skip logic in workflow
skip_ci = "[ci-skip]"

[changelog]
path = "CHANGELOG.md"
template = ".github/changelog.tera"
remote = "github.com"
owner = "gazorby"
repository = "fifc"
[[changelog.authors]]
signature = "gazorby"
username = "gazorby"
[[changelog.authors]]
signature = "github-actions[bot]"
username = "github-actions[bot]"
[[changelog.authors]]
signature = "Matthieu"
username = "gazorby"
[[changelog.authors]]
signature = "justbispo"
username = "justbispo"
[[changelog.authors]]
signature = "ollehu"
username = "ollehu"
[[changelog.authors]]
signature = "renovate[bot]"
username = "renovate[bot]"
[[changelog.authors]]
signature = "HydroH"
username = "HydroH"
[[changelog.authors]]
signature = "Maciej Piasecki"
username = "PiasekDev"
[[changelog.authors]]
signature = "Simon Mullis"
username = "simonm"
[[changelog.authors]]
signature = "Matthieu MN"
username = "gazorby"
[[changelog.authors]]
signature = "phanium"
username = "phanen"
[[changelog.authors]]
signature = "command_block"
username = "Zh40Le1ZOOB"
[[changelog.authors]]
signature = "Kid"
username = "kidonng"

[commit_types]
feat = { changelog_title = "🚀 Features", order = 1 }
fix = { changelog_title = "🐛 Bug Fixes", order = 2 }
perf = { changelog_title = "⚡ Performance", order = 3 }
refactor = { changelog_title = "🚜 Refactor", order = 4 }
ref = { changelog_title = "🚜 Refactor", order = 4 }
revert = { changelog_title = "◀️ Revert", order = 5 }
docs = { changelog_title = "📚 Documentation", order = 6 }
build = { changelog_title = "⚙️ Miscellaneous Tasks", order = 7 }
ci = { changelog_title = "⚙️ Miscellaneous Tasks", order = 7 }
style = { changelog_title = "🎨 Styling", order = 8 }
chore = { omit_from_changelog = true }
test = { omit_from_changelog = true }
[bump_profiles.ci]
pre_bump_hooks = ["git config user.name 'github-actions[bot]'", "git config user.email 'github-actions[bot]@users.noreply.github.com'"]
post_bump_hooks = ["git push", "git push origin {{version_tag}}"]
