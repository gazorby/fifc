version: v1

labels:

  # Semantic

  - label: 'feat'
    matcher:
      title: "^feat(\\([^()\\r\\n]*\\))?:.*"

  - label: 'fix'
    matcher:
      title: "^fix(\\([^()\\r\\n]*\\))?:.*"

  - label: 'chore'
    matcher:
      title: "^chore(\\([^()\\r\\n]*\\))?:.*"

  - label: 'chore'
    matcher:
      title: "^bump(\\((deps|ci)\\))?:.*"

  - label: 'docs'
    matcher:
      title: "^docs(\\([^()\\r\\n]*\\))?:.*"

  - label: 'perf'
    matcher:
      title: "^perf(\\([^()\\r\\n]*\\))?:.*"

  # Bots

  - label: dependabot
    matcher:
      branch: '^dependabot/.*'

  - label: renovate
    matcher:
      branch: '^renovate/.*'
