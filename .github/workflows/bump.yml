name: ⏫ Bump the version

on:
  workflow_dispatch:
    inputs:
      releaseType:
        description: "What kind of release is this?"
        required: false
        default: "auto"
        type: choice
        options:
          - "auto"
          - "major"
          - "minor"
          - "patch"

jobs:
  bump-version:
    name: Bump version
    runs-on: ubuntu-latest
    permissions:
      contents: write
    environment: release
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0
          token: ${{ secrets.PAT }}

      - name: Bump version and changelog
        uses: cocogitto/cocogitto-action@52d0023b4396897f1815648e553db2ab8d782f3a # v4
        with:
          command: bump
          args: ${{ github.event.inputs.releaseType == 'auto' && '--auto' || format('--{0}', github.event.inputs.releaseType) }}
          git-user: 'github-actions[bot]'
          git-user-email: 'github-actions[bot]@users.noreply.github.com'
