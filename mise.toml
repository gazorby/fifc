[env]
_.file = ".env"

[vars]
plugin_name = "fifc"
plugin_github_spec = "gazorby/fifc"

[tools]
actionlint = "latest"
cocogitto = "latest"
fd = "latest"
fzf = "latest"
jq = "latest"
yq = "latest"

[tasks."install"]
description = "Install pre-commit hooks"
alias = "i"
run = "pre-commit install --install-hooks 2>&1"

[tasks.format]
description = "Format code"
alias = "f"
run = '''
    #!/usr/bin/env fish
    fish_indent --write (fd .fish)
'''

[tasks."format:check"]
description = "Format code"
alias = "fc"
run = '''
    #!/usr/bin/env fish
    fish_indent --check (fd .fish)
'''

[tasks.syntax]
description = "Check fish syntax"
alias = "s"
run = '''
    #!/usr/bin/env fish
    fish --no-execute (fd .fish)
'''

[tasks."ci:lint"]
description = "Lint CI yaml files"
run = "actionlint -shellcheck ''"

[tasks.lint]
description = "Lint fish code"
alias = "l"
depends = ["format:check", "syntax", "ci:lint"]

[tasks.test]
description = "Test fish code"
alias = "t"
run = '''
    #!/usr/bin/env fish
    fishtape tests/**.fish
'''

[tasks."release:changelog"]
description = "Print release notes for the latest tag"
alias = "cl"
depends = ["release:authors:sync"]
run = '''
    #!/usr/bin/env bash
    cog changelog --at "$(git describe --tags --abbrev=0)" "$@"
'''

[tasks."release:bump"]
description = "Resolve author handles, then bump the version and changelog"
depends = ["release:authors:sync"]
run = '''
    #!/usr/bin/env bash
    cog bump --skip-untracked --annotated "{% raw %}bump from {{version}} to {{latest}}{% endraw %}" "$@"
'''

[tasks."release:authors:sync"]
description = "Resolve GitHub usernames for commit authors into cog config"
run = '''
    #!/usr/bin/env bash
    gh api --paginate "repos/{owner}/{repo}/commits?per_page=100" \
        --jq '.[] | [.commit.author.name, (.author.login // "")] | @tsv' \
        | awk -F'\t' '$2 != "" && !seen[$1]++' \
        | jq -R -s 'split("\n") | map(select(length > 0) | split("\t") | {signature: .[0], username: .[1]})' \
        | yq -p toml -o toml -i '.changelog.authors = ((.changelog.authors + load("/dev/stdin")) | unique_by(.signature))' cog.toml
'''

[tasks."install:plugin:dev"]
description = "Install fish plugin from the current folder"
dir = "{{ config_root }}"
run = '''
    #!/usr/bin/env fish
    if fisher list {{ vars.plugin_name }}
        fisher remove {{ vars.plugin_github_spec }}; or fisher remove .
    end
    fisher install .
'''
